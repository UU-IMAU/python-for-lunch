name: Build test mkdocs site
on:
    pull_request:

jobs:
    test:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v7
            - uses: astral-sh/setup-uv@v8.3.2
              with:
                  version: "latest"
            - run: uv run zensical build --clean
            - uses: actions/upload-artifact@v7
              with:
                  name: Website
                  path: ./site
                  if-no-files-found: error
                  retention-days: 3
